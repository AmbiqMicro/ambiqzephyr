description: NOR Flash devices IS25WX064 on MSPI bus

compatible: "mspi-is25wx064"

include: ambiq,mspi-device.yaml

properties:
  reset-gpios:
    type: phandle-array
    description: |
      The RESET pin is active low.
      If connected directly the MCU pin should be configured
      as active low.
