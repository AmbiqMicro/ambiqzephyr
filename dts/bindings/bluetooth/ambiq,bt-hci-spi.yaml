description: |
    Bluetooth module that uses Ambiq's Bluetooth Host Controller Interface SPI
    driver (e.g. Apollo4 Blue Plus).

compatible: "ambiq,bt-hci-spi"

include: [spi-device.yaml, bt-hci.yaml]

properties:
  reg:
    type: array
    required: true

  irq-gpios:
    type: phandle-array
    description: |
      This irq gpio is used to indicate there is packet ready to send to host
      from controller.

  reset-gpios:
    type: phandle-array
    description: |
      This reset gpio is used to reset the Bluetooth controller.

  cm-gpios:
    type: phandle-array
    description: |
      This cm gpio is used to control em9305 enter firmware update mode.  


  bt-hci-name:
    default: "ambiq hci"

  bt-hci-bus:
    default: "spi"

  cm-gpios:
    type: phandle-array
    description: GPIO specifier for configure mode pin.
