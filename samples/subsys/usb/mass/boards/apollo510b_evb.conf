CONFIG_MMC_DDR50=y
CONFIG_MMC_CARD_8BIT_WIDTH=y
CONFIG_APP_MSC_STORAGE_EMMC=y

# Enlarge the UDC request pool for the host's large (~4 KB) enumeration
# control transfers; the 1024-byte default is too small at high-speed.
CONFIG_UDC_BUF_POOL_SIZE=16384

# Use DMA1 (ADMA) mode for bulk endpoints. The default DMA0 mode services one
# packet per interrupt and cannot sustain back-to-back high-speed bulk packets,
# stalling mass-storage transfers. DMA1 streams the whole transfer in hardware.
CONFIG_UDC_AMBIQ_DMA1_MODE=y
