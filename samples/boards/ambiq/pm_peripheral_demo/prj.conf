# Logging
CONFIG_LOG=y

# BLE
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Ambiq PM Demo"

# Flash
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# SPI
CONFIG_SPI=y

# I2C
CONFIG_I2C=y

# Entropy (TRNG via zephyr,entropy = &trng in board chosen)
CONFIG_ENTROPY_GENERATOR=y

# CRC (hardware driver)
CONFIG_CRC=y

# Crypto (hardware CC312 AES via ambiq,crypto-aes DT node; driver auto-selected)
CONFIG_CRYPTO=y

# PM (already in board defconfig; kept here for portability)
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y

CONFIG_MAIN_STACK_SIZE=4096
