CONFIG_BT=y
CONFIG_BT_SMP=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DIS=y
CONFIG_BT_DIS_PNP=n
CONFIG_BT_BAS=y
CONFIG_BT_HRS=y

CONFIG_BT_DEVICE_NAME="Ambiq PM Demo"
CONFIG_BT_DEVICE_APPEARANCE=833

# Recommended LP advertising interval for test setup.
# These preferred connection parameters reduce connected-mode radio wakeups.
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=400
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=480
CONFIG_BT_PERIPHERAL_PREF_LATENCY=4
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=3200

# CEVA/RSS 510L: RF trim IPC + RSS opmode + HCI 0xFC80 NVDS sleep + VS 0xFC82/0xFC83,
# then host HCI_Reset (see apollox_ipc_support.c).

# Match AmbiqSuite ble_freertos_fit_lp early SoC init (LFRC RTC, XTAL deepsleep, SRAM 0.75M retain,
# caches off, IOSFD..NETAOL-1 gating, NETAOL/RSS on). See CONFIG_SOC_AMBIQ_APOLLO5X_BLE_LP in soc/Kconfig.
# Enabling this option will further reduce power consumption in sleep modes, but with risk of stability.
# Disable this option if user experience stability issues.
CONFIG_SOC_AMBIQ_APOLLO5X_BLE_LP=y

CONFIG_LOG=n
CONFIG_BOOT_BANNER=n
CONFIG_PRINTK=n
CONFIG_EARLY_CONSOLE=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n

# Keep Ambiq HAL GPIO available for SoC clock code without enabling the sample LED path.
CONFIG_PINCTRL=y
CONFIG_GPIO=n
CONFIG_SPI=n
CONFIG_I2C=n
CONFIG_WATCHDOG=n

# Enable CRC32 hardware accelerator.
CONFIG_CRC=y

# Demo threads exercise storage_partition through Zephyr's flash map API.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# Enable entropy/TRNG for random number generation.
CONFIG_ENTROPY_GENERATOR=y

# Demo AES thread uses the Ambiq CC312 AES crypto device.
CONFIG_CRYPTO=y

CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y
CONFIG_PM_NEED_ALL_DEVICES_IDLE=y

# CPU idle: long timer slips + default policy choose suspend-to-idle / suspend-to-ram from DT.
CONFIG_TICKLESS_KERNEL=y
CONFIG_PM_POLICY_DEFAULT=y
