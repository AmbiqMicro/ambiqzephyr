# Board-specific configuration for apollo510_evb
# Use Ambiq hardware entropy instead of test random generator

# Disable test random generator (software-based)
CONFIG_TEST_RANDOM_GENERATOR=n

# Enable Ambiq PUF TRNG hardware entropy driver
# Note: CSPRNG_ENABLED will be automatically enabled when ENTROPY_HAS_DRIVER is set
CONFIG_ENTROPY_AMBIQ_PUF_TRNG=y

# Ensure mbedtls entropy polling uses Zephyr's entropy API
# (These are typically enabled by default)
CONFIG_MBEDTLS_ENTROPY_C=y
CONFIG_MBEDTLS_ENTROPY_POLL_ZEPHYR=y
